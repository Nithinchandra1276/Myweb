<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #00ff80 0%, #313231 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 1200px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .admin-section {
            margin-bottom: 50px;
        }

        .admin-section h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .user-list {
            list-style: none;
            padding: 0;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid #e1e5e9;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }

        .user-info {
            flex-grow: 1;
        }

        .user-actions {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .edit-btn {
            background-color: #007bff;
            color: white;
        }

        .edit-btn:hover {
            background-color: #0056b3;
        }

        .delete-btn {
            background-color: #dc3545;
            color: white;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }

        .back-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            text-align: center;
        }

        .edit-form {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #e1e5e9;
            border-radius: 10px;
            background: #f9f9f9;
        }

        .edit-form input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .applications-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .applications-table th, .applications-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .applications-table th {
            background-color: #667eea;
            color: white;
            font-weight: 600;
        }

        .applications-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .applications-table tr:hover {
            background-color: #f5f5f5;
        }

        .no-applications {
            text-align: center;
            padding: 40px;
            color: #666;
            font-style: italic;
        }

        .application-details {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #667eea;
        }

        .application-details strong {
            color: #333;
        }

        @media (max-width: 480px) {
            .admin-container {
                padding: 20px;
            }
            .user-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .user-actions {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Admin Panel</h1>
        
        <div class="admin-section">
            <h2>User Management</h2>
            <ul class="user-list" id="userList"></ul>
        </div>

        <div class="admin-section">
            <h2>Service Applications</h2>
            <div id="applicationsContainer">
                <table class="applications-table" id="applicationsTable">
                    <thead>
                        <tr>
                            <th>Service Type</th>
                            <th>Applicant Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Application Type</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="applicationsBody">
                        <!-- Applications will be populated here -->
                    </tbody>
                </table>
                <div class="no-applications" id="noApplications" style="display: none;">
                    No service applications found.
                </div>
            </div>
        </div>

        <a href="options.html" class="back-btn">Back to Options</a>
    </div>

    <script>
        // Get users from localStorage
        function getUsers() {
            const users = localStorage.getItem('users');
            return users ? JSON.parse(users) : [];
        }

        // Save users to localStorage
        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        // Render user list
        function renderUsers() {
            const users = getUsers();
            const userList = document.getElementById('userList');
            userList.innerHTML = '';

            users.forEach((user, index) => {
                const li = document.createElement('li');
                li.className = 'user-item';
                li.innerHTML = `
                    <div class="user-info">
                        <strong>Username:</strong> ${user.username}<br>
                        <strong>Password:</strong> ${user.password}
                    </div>
                    <div class="user-actions">
                        <button class="edit-btn" onclick="editUser(${index})">Edit</button>
                        <button class="delete-btn" onclick="deleteUser(${index})">Delete</button>
                    </div>
                    <div class="edit-form" id="editForm${index}">
                        <input type="text" id="editUsername${index}" value="${user.username}" placeholder="Username">
                        <input type="password" id="editPassword${index}" value="${user.password}" placeholder="Password">
                        <button onclick="saveEdit(${index})">Save</button>
                        <button onclick="cancelEdit(${index})">Cancel</button>
                    </div>
                `;
                userList.appendChild(li);
            });
        }

        // Edit user
        function editUser(index) {
            const editForm = document.getElementById(`editForm${index}`);
            editForm.style.display = editForm.style.display === 'block' ? 'none' : 'block';
        }

        // Save edit
        function saveEdit(index) {
            const users = getUsers();
            const newUsername = document.getElementById(`editUsername${index}`).value;
            const newPassword = document.getElementById(`editPassword${index}`).value;

            if (newUsername && newPassword) {
                users[index] = { username: newUsername, password: newPassword };
                saveUsers(users);
                renderUsers();
            }
        }

        // Cancel edit
        function cancelEdit(index) {
            document.getElementById(`editForm${index}`).style.display = 'none';
        }

        // Delete user
        function deleteUser(index) {
            if (confirm('Are you sure you want to delete this user?')) {
                const users = getUsers();
                users.splice(index, 1);
                saveUsers(users);
                renderUsers();
            }
        }

        // Load users on page load
        renderUsers();
        renderApplications();

        // Get applications from localStorage
        function getApplications() {
            const applications = localStorage.getItem('serviceApplications');
            return applications ? JSON.parse(applications) : [];
        }

        // Render applications list
        function renderApplications() {
            const applications = getApplications();
            const applicationsBody = document.getElementById('applicationsBody');
            const noApplications = document.getElementById('noApplications');
            
            applicationsBody.innerHTML = '';

            if (applications.length === 0) {
                noApplications.style.display = 'block';
                return;
            }

            noApplications.style.display = 'none';

            applications.forEach((application, index) => {
                const row = document.createElement('tr');
                const applicationDate = new Date(application.timestamp).toLocaleDateString();
                
                row.innerHTML = `
                    <td>${application.serviceType}</td>
                    <td>${application.applicantName}</td>
                    <td>${application.applicantEmail}</td>
                    <td>${application.applicantPhone}</td>
                    <td>${application.applicationType}</td>
                    <td>${applicationDate}</td>
                    <td>
                        <button class="edit-btn" onclick="viewApplicationDetails(${index})">View Details</button>
                        <button class="delete-btn" onclick="deleteApplication(${index})">Delete</button>
                    </td>
                `;
                applicationsBody.appendChild(row);
            });
        }

        // View application details
        function viewApplicationDetails(index) {
            const applications = getApplications();
            const application = applications[index];
            
            const details = `
                <strong>Service Type:</strong> ${application.serviceType}<br>
                <strong>Applicant Name:</strong> ${application.applicantName}<br>
                <strong>Email:</strong> ${application.applicantEmail}<br>
                <strong>Phone:</strong> ${application.applicantPhone}<br>
                <strong>Address:</strong> ${application.applicantAddress}<br>
                <strong>Application Type:</strong> ${application.applicationType}<br>
                <strong>Additional Info:</strong> ${application.additionalInfo || 'N/A'}<br>
                <strong>User ID:</strong> ${application.userId}<br>
                <strong>Submitted Date:</strong> ${new Date(application.timestamp).toLocaleString()}
            `;
            
            alert(`Application Details:\n\n${details.replace(/<br>/g, '\n').replace(/<strong>/g, '').replace(/<\/strong>/g, '')}`);
        }

        // Delete application
        function deleteApplication(index) {
            if (confirm('Are you sure you want to delete this application?')) {
                const applications = getApplications();
                applications.splice(index, 1);
                localStorage.setItem('serviceApplications', JSON.stringify(applications));
                renderApplications();
            }
        }

    </script>

        // Apply translation on page load
        window.addEventListener('load', function() {
            const savedLanguage = localStorage.getItem('selectedLanguage');
            if (savedLanguage && savedLanguage !== 'en') {
                setTimeout(() => {
                    applyTranslation(savedLanguage);
                }, 100);
            }
        });

        // Function to apply translation
        function applyTranslation(language) {
            if (language === 'en') return;

            const langTranslations = translations[language];
            if (!langTranslations) return;

            // Translate all text content on the page
            const elements = document.querySelectorAll('*');
            elements.forEach(element => {
                if (element.children.length === 0 && element.textContent.trim()) {
                    const originalText = element.textContent.trim();
                    if (langTranslations[originalText]) {
                        element.textContent = langTranslations[originalText];
                    }
                }
            });

            // Translate input placeholders
            const inputs = document.querySelectorAll('input[placeholder]');
            inputs.forEach(input => {
                const placeholder = input.getAttribute('placeholder');
                if (langTranslations[placeholder]) {
                    input.setAttribute('placeholder', langTranslations[placeholder]);
                }
            });

            // Translate button values
            const buttons = document.querySelectorAll('button, input[type="submit"]');
            buttons.forEach(button => {
                const value = button.value || button.textContent;
                if (langTranslations[value]) {
                    if (button.tagName === 'INPUT') {
                        button.value = langTranslations[value];
                    } else {
                        button.textContent = langTranslations[value];
                    }
                }
            });
        }
    </script>
