    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #d48e8e 0%, #795899 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .options-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-size: 36px;
        }

        .option-wrapper {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .option-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px;
            padding: 30px 40px;
            background: linear-gradient(135deg, #cfe53f 0%, #cf6161 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            min-height: 120px;
            text-align: center;
        }

        .option-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .option-button:nth-child(2) {
            background: linear-gradient(135deg, #054e4a 0%, #8e6746 100%);
        }

        .option-title {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .option-desc {
            font-size: 14px;
            font-weight: 400;
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            .options-container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 28px;
            }
            .option-wrapper {
                gap: 15px;
            }
            .option-button {
                margin: 10px 0;
                padding: 20px 30px;
                min-height: 100px;
            }
        }
    </style>
</head>

        // Apply translation on page load
        window.addEventListener('load', function() {
            const savedLanguage = localStorage.getItem('selectedLanguage');
            if (savedLanguage && savedLanguage !== 'en') {
                setTimeout(() => {
                    applyTranslation(savedLanguage);
                }, 100);
            }
        });

        // Function to apply translation
        function applyTranslation(language) {
            if (language === 'en') return;

            const langTranslations = translations[language];
            if (!langTranslations) return;

            // Translate all text content on the page
            const elements = document.querySelectorAll('*');
            elements.forEach(element => {
                if (element.children.length === 0 && element.textContent.trim()) {
                    const originalText = element.textContent.trim();
                    if (langTranslations[originalText]) {
                        element.textContent = langTranslations[originalText];
                    }
                }
            });
        }
